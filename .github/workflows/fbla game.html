<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Myers Park, Know Where You Are When</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #e6f4ea;
      margin: 0;
      padding: 0;
      color: #1a3d1a;
    }
    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
      font-size: 2rem;
      font-weight: 700;
      color: #2e7d32;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(46, 125, 50, 0.25);
      border: 2px solid #4caf50;
    }
    label {
      display: block;
      margin-top: 1rem;
      font-weight: 600;
      color: #2e7d32;
    }
    input, select {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.25rem;
      border: 1.5px solid #81c784;
      border-radius: 6px;
      font-size: 1rem;
      background-color: #f1f8f1;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background-color: #388e3c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 3px 6px rgba(56, 142, 60, 0.5);
    }
    button:hover {
      background-color: #2e7d32;
    }
    .toggle-btn {
      background: #fff;
      color: #388e3c;
      border: 2px solid #388e3c;
      margin-left: 1rem;
      margin-top: 0;
      box-shadow: none;
    }
    .toggle-btn.active {
      background: #388e3c;
      color: #fff;
    }
    .totals {
      margin-top: 1.5rem;
      font-weight: 600;
      color: #1b5e20;
    }
    .schedule {
      margin-top: 1.5rem;
      border-top: 2px solid #4caf50;
      padding-top: 1rem;
    }
    .schedule-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #c8e6c9;
      font-weight: 600;
      font-size: 1.1rem;
      color: #1b5e20;
    }
    table.schedule-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
    }
    table.schedule-table th, table.schedule-table td {
      border: 1.5px solid #81c784;
      padding: 0.5rem 0.75rem;
      text-align: center;
      font-size: 1rem;
    }
    table.schedule-table th {
      background: #c8e6c9;
      color: #1b5e20;
      font-weight: 700;
    }
    table.schedule-table td.role {
      font-weight: 700;
      color: #2e7d32;
      background: #e8f5e9;
      text-align: left;
    }
    .footer {
      position: fixed;
      bottom: 10px;
      right: 20px;
      font-size: 0.8rem;
      color: #2e7d32;
      font-weight: 500;
      user-select: none;
    }
    @media (max-width: 700px) {
      .container { padding: 1rem; }
      table.schedule-table th, table.schedule-table td { font-size: 0.9rem; padding: 0.25rem 0.5rem; }
    }
  </style>
</head>
<body>
  <header>Myers Park, Know Where You Are When</header>
  <div class="container">
    <label for="startTime">Start Time:</label>
    <input type="time" id="startTime" />

    <label for="endTime">End Time:</label>
    <input type="time" id="endTime" />

    <label for="guardCount">Number of Guards (default is 5):</label>
    <input type="number" id="guardCount" placeholder="5" min="4" />

    <div style="margin-top:1.5rem;">
      <button id="generateBtn">Generate Schedule</button>
      <button id="listBtn" class="toggle-btn active" type="button">List</button>
      <button id="spreadsheetBtn" class="toggle-btn" type="button">Spreadsheet</button>
    </div>

    <div class="totals" id="totals"></div>
    <div class="schedule" id="schedule"></div>
  </div>
  <div class="footer">Made by AL</div>

  <script>
    function getRoles(guardCount) {
      if (guardCount === 4) {
        return ['Main', 'Dive', 'Baby', 'Rest'];
      } else if (guardCount === 5) {
        return ['Check In', 'Main', 'Dive', 'Baby', 'Rest'];
      } else if (guardCount === 6) {
        return ['Check In', 'Main', 'Dive', 'Baby', 'Rest', 'Rest'];
      } else if (guardCount > 6) {
        let roles = ['Check In', 'Main', 'Dive', 'Baby'];
        for (let i = 0; i < guardCount - 4; i++) {
          roles.push('Rest');
        }
        return roles;
      }
      return [];
    }

    function timeToMinutes(timeStr) {
      const [hours, minutes] = timeStr.split(':').map(Number);
      return hours * 60 + minutes;
    }
    function minutesToAmPm(minutes) {
      let h = Math.floor(minutes / 60);
      let m = minutes % 60;
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12;
      h = h === 0 ? 12 : h;
      const mStr = m.toString().padStart(2, '0');
      return `${h}:${mStr} ${ampm}`;
    }
    function formatMinutesToHM(mins) {
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return `${h}h ${m}m`;
    }
    function isLifeguarding(role, startMin) {
      const minuteOfHour = startMin % 60;
      return (
        role === 'Baby' ||
        ((role === 'Main' || role === 'Dive') && minuteOfHour >= 0 && minuteOfHour < 50)
      );
    }

    // Store the schedule globally for display switching
    let lastSchedule = null;
    let lastRoleInstances = null;
    let lastTotals = null;

    function generateSchedule() {
      const start = document.getElementById('startTime').value;
      const end = document.getElementById('endTime').value;
      const guardInput = document.getElementById('guardCount').value;
      const guardCount = guardInput ? parseInt(guardInput) : 5;

      if (!start || !end) {
        alert("Please enter both start and end times.");
        return;
      }
      if (guardCount < 4) {
        alert("Minimum of 4 guards is required.");
        return;
      }

      const roles = getRoles(guardCount);
      const startMin = timeToMinutes(start);
      const endMin = timeToMinutes(end);
      if (endMin <= startMin) {
        alert("End time must be after start time.");
        return;
      }

      // Prepare the schedule as an array of {start, end, roleInstance, baseRole}
      let currentTime = startMin;
      let index = 0;
      let lifeguardMinutes = 0;
      let scheduleArr = [];
      // Track how many times each role has occurred so far
      let roleCounter = {};
      let baseRoles = [];
      roles.forEach(role => {
        const base = role.startsWith('Rest') ? 'Rest' : role;
        if (!baseRoles.includes(base)) baseRoles.push(base);
      });

      // For roles with multiple instances, append a number (e.g., Rest 1, Rest 2)
      let roleInstanceNames = [];
      let roleInstanceMap = {};
      roles.forEach(role => {
        const base = role.startsWith('Rest') ? 'Rest' : role;
        roleCounter[base] = (roleCounter[base] || 0) + 1;
        let instanceName = base;
        if (base === 'Rest' && roleCounter[base] > 1) {
          instanceName = base + ' ' + roleCounter[base];
        } else if (base === 'Rest') {
          instanceName = base + ' 1';
        }
        roleInstanceNames.push(instanceName);
        roleInstanceMap[instanceName] = base;
      });

      // Reset for schedule generation
      roleCounter = {};
      let scheduleByInstance = {};
      roleInstanceNames.forEach(name => scheduleByInstance[name] = []);
      let scheduleBlocks = [];

      // Schedule assignment
      let rotationLen = roles.length;
      let rotationCounter = {};
      roles.forEach(role => {
        const base = role.startsWith('Rest') ? 'Rest' : role;
        rotationCounter[base] = (rotationCounter[base] || 0) + 1;
      });

      let roleInstanceOrder = [];
      let baseRoleCounts = {};
      roles.forEach(role => {
        const base = role.startsWith('Rest') ? 'Rest' : role;
        baseRoleCounts[base] = (baseRoleCounts[base] || 0) + 1;
      });
      // Build the ordered list of unique role instances for rows
      let instanceRows = [];
      roles.forEach(role => {
        const base = role.startsWith('Rest') ? 'Rest' : role;
        if (base === 'Rest') {
          for (let i = 1; i <= baseRoleCounts[base]; i++) {
            let name = 'Rest ' + i;
            if (!instanceRows.includes(name)) instanceRows.push(name);
          }
        } else {
          if (!instanceRows.includes(base)) instanceRows.push(base);
        }
      });

      // Now assign each time block to the correct role instance in rotation order
      currentTime = startMin;
      index = 0;
      roleCounter = {};
      while (currentTime < endMin) {
        let endTime = Math.min(currentTime + 20, endMin);
        let role = roles[index % roles.length];
        let base = role.startsWith('Rest') ? 'Rest' : role;
        roleCounter[base] = (roleCounter[base] || 0) + 1;
        let instanceName = base;
        if (base === 'Rest') {
          instanceName = base + ' ' + (((index % roles.length) - roles.indexOf('Rest') + baseRoleCounts[base]) % baseRoleCounts[base] + 1);
        }
        // For multiple Rest, cycle through Rest 1, Rest 2, etc.
        if (base === 'Rest') {
          let restIndex = 0;
          let restCount = 0;
          for (let i = 0; i <= (index % roles.length); i++) {
            if (roles[i] === 'Rest') restCount++;
          }
          restIndex = ((restCount - 1) % baseRoleCounts[base]) + 1;
          instanceName = 'Rest ' + restIndex;
        }
        scheduleByInstance[instanceName].push({start: currentTime, end: endTime});
        if (isLifeguarding(base, currentTime)) lifeguardMinutes += (endTime - currentTime);
        currentTime = endTime;
        index++;
      }

      // Save for display
      lastSchedule = scheduleByInstance;
      lastRoleInstances = instanceRows;
      lastTotals = {
        shift: endMin - startMin,
        lifeguard: lifeguardMinutes
      };
      showList();
      document.getElementById('listBtn').classList.add('active');
      document.getElementById('spreadsheetBtn').classList.remove('active');
    }

    function showList() {
      if (!lastSchedule) return;
      const scheduleDiv = document.getElementById('schedule');
      const totalsDiv = document.getElementById('totals');
      scheduleDiv.innerHTML = '';
      totalsDiv.innerHTML = `
        <div>Total Shift Time: ${formatMinutesToHM(lastTotals.shift)}</div>
        <div>Total Lifeguarding Time: ${formatMinutesToHM(lastTotals.lifeguard)}</div>
      `;
      // Flatten all blocks to a single sorted list
      let allBlocks = [];
      lastRoleInstances.forEach(role => {
        lastSchedule[role].forEach(block => {
          allBlocks.push({role, ...block});
        });
      });
      allBlocks.sort((a, b) => a.start - b.start);
      allBlocks.forEach(block => {
        const item = document.createElement('div');
        item.className = 'schedule-item';
        item.textContent = `${minutesToAmPm(block.start)} - ${minutesToAmPm(block.end)}: ${block.role}`;
        scheduleDiv.appendChild(item);
      });
    }

    function showSpreadsheet() {
      if (!lastSchedule) return;
      const scheduleDiv = document.getElementById('schedule');
      const totalsDiv = document.getElementById('totals');
      scheduleDiv.innerHTML = '';
      totalsDiv.innerHTML = `
        <div>Total Shift Time: ${formatMinutesToHM(lastTotals.shift)}</div>
        <div>Total Lifeguarding Time: ${formatMinutesToHM(lastTotals.lifeguard)}</div>
      `;
      // Find the max number of time blocks for any role instance
      const maxBlocks = Math.max(...lastRoleInstances.map(r => lastSchedule[r].length));
      // Build the table
      let table = document.createElement('table');
      table.className = 'schedule-table';
      let thead = document.createElement('thead');
      let tr = document.createElement('tr');
      let thRole = document.createElement('th');
      thRole.textContent = 'Role';
      tr.appendChild(thRole);
      for (let i = 1; i <= maxBlocks; i++) {
        let th = document.createElement('th');
        th.textContent = `Block ${i}`;
        tr.appendChild(th);
      }
      thead.appendChild(tr);
      table.appendChild(thead);

      let tbody = document.createElement('tbody');
      lastRoleInstances.forEach(role => {
        let tr = document.createElement('tr');
        let tdRole = document.createElement('td');
        tdRole.className = 'role';
        tdRole.textContent = role;
        tr.appendChild(tdRole);
        let blocks = lastSchedule[role];
        for (let i = 0; i < maxBlocks; i++) {
          let td = document.createElement('td');
          if (blocks[i]) {
            td.textContent = `${minutesToAmPm(blocks[i].start)} - ${minutesToAmPm(blocks[i].end)}`;
          } else {
            td.textContent = '';
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      scheduleDiv.appendChild(table);
    }

    document.getElementById('generateBtn').addEventListener('click', generateSchedule);
    document.getElementById('listBtn').addEventListener('click', function() {
      showList();
      this.classList.add('active');
      document.getElementById('spreadsheetBtn').classList.remove('active');
    });
    document.getElementById('spreadsheetBtn').addEventListener('click', function() {
      showSpreadsheet();
      this.classList.add('active');
      document.getElementById('listBtn').classList.remove('active');
    });
  </script>
</body>
</html>
